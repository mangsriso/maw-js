<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Oracle Office 8-bit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

    /* Navbar */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: rgba(10, 10, 15, 0.92);
      border-bottom: 1px solid rgba(100, 181, 246, 0.15);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 200;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #cdd6f4;
      backdrop-filter: blur(8px);
    }

    #navbar .logo {
      color: #64b5f6;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
    }

    #navbar .sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
    }

    #navbar .agents-count {
      color: #81c784;
    }

    #navbar .controls {
      margin-left: auto;
      display: flex;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 10px;
    }

    #navbar .controls kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }

    #navbar a {
      color: #64b5f6;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #navbar a:hover { opacity: 1; }

    /* Background layer (hidden — terrain rendered in canvas by WASM) */
    #bg-layer { display: none; }

    /* Canvas below navbar */
    #office-canvas {
      position: fixed;
      top: 40px;
      left: 0;
      width: 100vw;
      height: calc(100vh - 40px);
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 1;
    }

    /* HTML overlay for popups */
    #popup-layer {
      position: fixed;
      top: 40px; left: 0;
      width: 100%; height: calc(100% - 40px);
      pointer-events: none;
      z-index: 100;
    }

    .agent-popup {
      position: absolute;
      pointer-events: auto;
      background: rgba(10, 10, 15, 0.95);
      border: 1px solid rgba(100, 181, 246, 0.3);
      border-radius: 8px;
      padding: 16px;
      min-width: 500px;
      max-width: 700px;
      max-height: 70vh;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #cdd6f4;
      overflow: hidden;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 1px rgba(100,181,246,0.3);
    }

    .agent-popup .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .agent-popup .name {
      font-weight: bold;
      font-size: 13px;
    }

    .agent-popup .status {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .agent-popup .terminal {
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
      max-height: calc(70vh - 80px);
      overflow-y: auto;
    }

    .status-busy { background: rgba(253, 216, 53, 0.2); color: #fdd835; }
    .status-ready { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-idle { background: rgba(255, 255, 255, 0.1); color: #90a4ae; }
    .status-saiyan { background: rgba(255, 215, 0, 0.3); color: #ffd700; }

    /* Loading screen */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #0a0a0f;
      color: #64b5f6;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      z-index: 1000;
    }

    #loading .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>Oracle Office 8-bit</div>
    <div class="dots">Loading WASM</div>
  </div>

  <nav id="navbar">
    <span class="logo">Oracle Office</span>
    <div class="sep"></div>
    <span class="agents-count" id="agent-count">0 agents</span>
    <div class="sep"></div>
    <a href="/office" target="_blank">React Office</a>
    <div class="controls">
      <span><kbd>WASD</kbd> move</span>
      <span><kbd>Ctrl</kbd>+scroll zoom</span>
      <span><kbd>Space</kbd>+drag pan</span>
    </div>
  </nav>

  <div id="bg-layer"></div>
  <canvas id="office-canvas"></canvas>

  <div id="popup-layer">
    <div class="agent-popup" id="agent-popup">
      <div class="header">
        <span class="name" id="popup-name"></span>
        <span class="status" id="popup-status"></span>
      </div>
      <div class="terminal" id="popup-terminal"></div>
    </div>
  </div>

  <script type="module" src="/office-8bit/bridge.js"></script>
  <script type="module">
    import init from '/office-8bit/office-8bit.js';

    async function start() {
      try {
        await init();
      } catch (err) {
        if (err.message && err.message.includes('Using exceptions for control flow')) {
          console.log('[Bevy] Event loop started via exception (normal WASM behavior)');
        } else {
          console.error('WASM init failed:', err);
          document.querySelector('#loading .dots').textContent = 'Error: ' + err.message;
          return;
        }
      }
      document.getElementById('loading').style.display = 'none';
    }

    // Prevent space from scrolling page
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') e.preventDefault();
    });

    start();
  </script>
</body>
</html>
